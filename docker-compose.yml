version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Qatar Traffic Violations – Full-stack Docker Compose
#
#  Domain:  fees2.com          → frontend SPA
#           fees2.com/api/*    → backend Express API
#           admin.fees2.com    → admin panel SPA
#
#  Services:
#    backend  → Node/Express API         (internal port 5000)
#    frontend → Nginx serving React SPA  (internal port 80)
#    admin    → Nginx serving Admin SPA  (internal port 80)
#    nginx    → Reverse-proxy / TLS      (public ports 80 & 443)
#
#  Before running:
#    cp backend/.env.production.example backend/.env.production
#    nano backend/.env.production   ← fill in real secrets
# ─────────────────────────────────────────────────────────────

services:

  # ── 1. Express / Node backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qatar_backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: "5000"
      CORS_ORIGIN: "https://fees2.com,https://www.fees2.com,https://admin.fees2.com"
    expose:
      - "5000"
    networks:
      - qatar_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── 2. Frontend React SPA ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://fees2.com/api"
    container_name: qatar_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - qatar_net
    depends_on:
      - backend

  # ── 3. Admin React SPA ───────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://fees2.com/api"
    container_name: qatar_admin
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - qatar_net
    depends_on:
      - backend

  # ── 4. Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qatar_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - qatar_net
    depends_on:
      - frontend
      - admin
      - backend

  # ── 5. Certbot (SSL cert manager) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: qatar_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do sleep 12h; done"]
    networks:
      - qatar_net

volumes:
  certbot_www:
  certbot_certs:

networks:
  qatar_net:
    driver: bridge
