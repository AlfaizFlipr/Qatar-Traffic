version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Qatar Traffic Violations – Full-stack Docker Compose
#
#  Domain:  fees2.com          → frontend SPA
#           fees2.com/api/*    → backend Express API
#           admin.fees2.com    → admin panel SPA
#
#  Services:
#    backend  → Node/Express API         (internal port 5000)
#    frontend → Nginx serving React SPA  (internal port 80)
#    admin    → Nginx serving Admin SPA  (internal port 80)
#    nginx    → Reverse-proxy / TLS      (public ports 80 & 443)
#
#  Before running:
#    cp backend/.env.production.example backend/.env.production
#    nano backend/.env.production   ← fill in real secrets
# ─────────────────────────────────────────────────────────────

services:

  # ── 0. Gluetun VPN (HTTP proxy for Playwright scraper) ──────
  #
  #  Provides an HTTP proxy on :8888 that routes scraping
  #  requests through a VPN exit node (Qatar/UAE IP).
  #  Place your VPNjantit .ovpn config at ./vpn/server.ovpn
  #  then set OPENVPN_USER / OPENVPN_PASSWORD in .env.production.
  #
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: qatar_gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./vpn:/gluetun/custom:ro
    environment:
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: openvpn
      OPENVPN_CUSTOM_CONFIG: /gluetun/custom/server.ovpn
      OPENVPN_USER: ${OPENVPN_USER:-vpnjantit_user}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-vpnjantit_pass}
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
      HTTPPROXY_LOG: "off"
      TZ: Asia/Qatar
    networks:
      - qatar_net

  # ── 1. Express / Node backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qatar_backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: "5000"
      CORS_ORIGIN: "https://fees2.com,https://www.fees2.com,https://admin.fees2.com"
      # Route Playwright scraper traffic through gluetun VPN proxy.
      PLAYWRIGHT_PROXY: "http://gluetun:8888"
    expose:
      - "5000"
    networks:
      - qatar_net
    depends_on:
      - gluetun
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── 2. Frontend React SPA ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://fees2.com/api"
    container_name: qatar_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - qatar_net
    depends_on:
      - backend

  # ── 3. Admin React SPA ───────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://fees2.com/api"
    container_name: qatar_admin
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - qatar_net
    depends_on:
      - backend

  # ── 4. Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qatar_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - qatar_net
    depends_on:
      - frontend
      - admin
      - backend

  # ── 5. Certbot (SSL cert manager) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: qatar_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do sleep 12h; done"]
    networks:
      - qatar_net

volumes:
  certbot_www:
  certbot_certs:

networks:
  qatar_net:
    driver: bridge
