# ─────────────────────────────────────────────────────────────
# Qatar Traffic Violations — Nginx Reverse Proxy Virtual Hosts
#
# Domains:
#   fees2.com          → frontend SPA  + /api/* → backend
#   www.fees2.com      → redirect to fees2.com
#   admin.fees2.com    → admin SPA
#
# HOW TO USE:
#   1. Start with only the HTTP blocks (get SSL certs first).
#   2. Once certbot succeeds, uncomment the HTTPS server blocks.
#   3. Reload nginx:  docker compose exec nginx nginx -s reload
# ─────────────────────────────────────────────────────────────

# ── Catch-all: serve ACME challenge for any host ─────────────
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 444;
    }
}

# ── www → non-www redirect ────────────────────────────────────
server {
    listen 80;
    server_name www.fees2.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://fees2.com$request_uri;
    }
}

# ── Main site: HTTP (ACME challenge + redirect to HTTPS) ─────
server {
    listen 80;
    server_name fees2.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://fees2.com$request_uri;
    }
}

# ── Admin: HTTP (ACME challenge + redirect to HTTPS) ─────────
server {
    listen 80;
    server_name admin.fees2.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://admin.fees2.com$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS blocks — active (certs issued by certbot)
# ─────────────────────────────────────────────────────────────

# ── Main site: HTTPS ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name fees2.com www.fees2.com;

    ssl_certificate     /etc/letsencrypt/live/fees2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fees2.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Backend API (/api/* → Express) ──────────────────────
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 2m;
    }

    # ── Frontend SPA ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Admin panel: HTTPS ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.fees2.com;

    ssl_certificate     /etc/letsencrypt/live/admin.fees2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.fees2.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
